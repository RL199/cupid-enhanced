<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupid Enhanced Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">
        <div class="header">
            <img src="../assets/branding/cupid-enhanced.svg" alt="Cupid Enhanced" class="header-logo">
        </div>

        <div class="settings-container">
            <div id="settings-list">
                <div class="setting-item" data-setting="staffMode">
                    <div class="setting-info">
                        <div class="setting-text">
                            <h3 class="setting-title">Staff Mode</h3>
                            <span class="setting-description">Shows staff panel on the left sidebar</span>
                        </div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" data-key="staffMode">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="setting-item" data-setting="enhanceDiscoverPage">
                    <div class="setting-info">
                        <h3 class="setting-title">Better Discover Layout</h3>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" data-key="enhanceDiscoverPage">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="setting-item" data-setting="enhanceLikesYouPage">
                    <div class="setting-info">
                        <h3 class="setting-title">Better Likes You Layout</h3>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" data-key="enhanceLikesYouPage">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="setting-item" data-setting="horizontalScroll">
                    <div class="setting-info">
                        <h3 class="setting-title">Horizontal Mouse Scroll to Browse</h3>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" data-key="horizontalScroll">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="setting-item" data-setting="darkMode">
                    <div class="setting-info">
                        <h3 class="setting-title">Dark Mode (Experimental)</h3>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" data-key="darkMode">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>


        </div>

        <div class="footer">
            <span class="instructions">Refresh the site to apply changes</span>
            <span class="version" id="version"></span>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
